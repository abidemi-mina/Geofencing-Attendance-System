{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}

{% block auth_content %}
<div style="text-align:center; margin-bottom:28px;">
    <div style="width:52px;height:52px;background:var(--primary);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;margin-bottom:16px;">AT</div>
    <h2 style="font-size:24px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px;">Welcome back</h2>
    <p style="font-size:14px;color:var(--muted);line-height:1.5;">Sign in to your AttendTrack account to continue.</p>
</div>

<form method="post" id="loginForm" novalidate>
    {% csrf_token %}

    <div class="form-group">
        <label class="form-label" for="username">
            Matric Number <span class="required">*</span>
        </label>
        <div style="position:relative;">
            <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none;" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
            </svg>
            <input
                type="text"
                name="username"
                id="username"
                autocomplete="username"
                placeholder="e.g. CSC/19/0001"
                required
                style="padding-left:38px; text-transform:uppercase; letter-spacing:.04em;"
            >
        </div>
    </div>

    <div class="form-group">
        <label class="form-label" for="password">
            Password <span class="required">*</span>
        </label>
        <div style="position:relative;">
            <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none;" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
            </svg>
            <input
                type="password"
                name="password"
                id="password"
                autocomplete="current-password"
                placeholder="Enter your password"
                required
                style="padding-left:38px; padding-right:44px;"
            >
            <button
                type="button"
                id="togglePwd"
                aria-label="Toggle password visibility"
                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:4px;display:flex;align-items:center;"
            >
                <svg id="eyeIcon" style="width:16px;height:16px;" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                    <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
                </svg>
            </button>
        </div>
    </div>

    <button
        type="submit"
        id="submitBtn"
        class="btn btn-primary btn-lg"
        style="width:100%;justify-content:center;margin-top:4px;"
    >
        <svg style="width:16px;height:16px;" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/>
        </svg>
        Sign in
    </button>
</form>

<p style="text-align:center;margin-top:20px;font-size:12.5px;color:var(--muted);line-height:1.5;">
    Default student password is <strong>ChangeMe123!</strong> after first upload.<br>
    Contact your lecturer for account issues.
</p>

<script>
/* Toggle password visibility */
document.getElementById('togglePwd').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const isText = pwd.type === 'text';
    pwd.type = isText ? 'password' : 'text';
    document.getElementById('eyeIcon').innerHTML = isText
        ? '<path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>'
        : '<path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/>';
});

/* Matric uppercase */
document.getElementById('username').addEventListener('input', function() {
    const pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(pos, pos);
});

/* Loading state on submit */
document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    btn.classList.add('btn-loading');
    btn.disabled = true;
});
</script>
{% endblock %}
